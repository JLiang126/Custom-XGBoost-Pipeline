# cloud-config
package_update: true

# 1. Install MicroK8s automatically via snap
snap:
  commands:
    - snap install microk8s --classic --channel=1.30/stable

# 2. Run the user configuration and add-on commands on boot
runcmd:
  - usermod -a -G microk8s ubuntu
  - mkdir -p /home/ubuntu/.kube
  - chown -f -R ubuntu:ubuntu /home/ubuntu/.kube
  - /snap/bin/microk8s enable dns storage registry